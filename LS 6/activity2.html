<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1> Personal Details Forms</h1>
    <form>
        <fieldset>
            <legend>Personal Information:</legend>
        <label>Name</label><br>
        <input type="text" id="name"><br><br>
        <label> Email ID </label><br>
        <input type="text"id="email id"><br><br>
        <label> Contact Number </label><br>
        <input type="password" id="contact number"<br><br>
        <label> Gender </label><br>
        <input type="radio" id="female" name="gender" value="Female">Female<br>

<input type="radio" id="male" name="gender" value="Male">Male<br><br>

<label> Favourite City</label><br>
<input type="checkbox" id="city" value="New Delhi">New Delhi<br>

<input type="checkbox" id="city" value="Mumbai">Mumbai<br><br>


<input type="submit">
</fieldset>

    </form>
    
  
</body>
</html>
